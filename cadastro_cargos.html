<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cadastro de Cargos</title>
<style>
body{font-family:Arial;background:#eef3f5;margin:0;padding:20px}
.box{max-width:800px;margin:auto}.head{background:linear-gradient(135deg,#0a8f45,#18b85d);color:#fff;padding:20px;border-radius:14px;text-align:center}
.card{background:#fff;padding:20px;margin-top:16px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin:8px 0}
button{padding:11px 16px;border:none;border-radius:10px;background:#0a8f45;color:#fff;font-weight:bold;margin:5px;cursor:pointer}
</style></head>
<body>
<div class="box">
<div class="head"><h1>🧾 Cadastro de Cargos</h1><p>Painel de Metas 3.0</p></div>
<div class="card">
<input id="cargo" placeholder="Nome do Cargo">
<select id="status"><option>Ativo</option><option>Inativo</option></select>

<button onclick="salvar()">💾 Salvar</button>
<button onclick="limpar()">🧹 Limpar</button>
<button onclick="toggle()">📋 Cargos Cadastrados</button>
<button onclick="location.href='tela_cadastro.html'">⬅️ Cadastros</button>

<div id="painel" style="display:none;margin-top:15px">
<select id="lista" onchange="carregar()" style="width:100%;padding:10px"></select><br><br>
<button onclick="salvar()">✏️ Salvar Alterações</button>
<button onclick="excluir()" style="background:#c62828">🗑️ Excluir</button>
</div>
</div>
</div>

<script>
let edit=-1;
const dados=()=>JSON.parse(localStorage.getItem('cargos')||'[]');
const gravar=x=>localStorage.setItem('cargos',JSON.stringify(x));

function atualizar(){
lista.innerHTML='<option value="">Selecione...</option>';
dados().forEach((c,i)=>lista.innerHTML+=`<option value="${i}">${c.nome}</option>`);
}
function salvar(){
let a=dados();
let o={nome:cargo.value,status:status.value};
if(edit>=0)a[edit]=o; else a.push(o);
gravar(a);limpar();atualizar();alert('Cargo salvo!');
}
function carregar(){
if(lista.value==='')return;
edit=+lista.value;
let c=dados()[edit];
cargo.value=c.nome;
status.value=c.status;
}
function excluir(){
if(edit<0)return;
let a=dados();
a.splice(edit,1);
gravar(a);
limpar();
atualizar();
}
function limpar(){
edit=-1;
cargo.value='';
status.value='Ativo';
}
function toggle(){
painel.style.display=painel.style.display==='none'?'block':'none';
}
atualizar();
</script>
</body></html>
