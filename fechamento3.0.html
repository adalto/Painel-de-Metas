<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fechamentos</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#eef2f5;padding:16px}
.container{max-width:560px;margin:auto}
.header{background:linear-gradient(135deg,#009640,#00b35a);color:#fff;padding:22px;border-radius:18px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.card{margin-top:16px;background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
label{display:block;margin-top:12px;font-weight:bold}
input,textarea,select{width:100%;padding:12px;margin-top:6px;border:1px solid #ccc;border-radius:10px}
textarea{min-height:90px}
.resumo{margin-top:16px;background:#f8faf8;border-left:5px solid #009640;padding:12px;border-radius:10px}
button{width:100%;padding:14px;margin-top:16px;border:none;border-radius:12px;font-size:16px;font-weight:bold;background:#009640;color:#fff}
.sec{background:#1976d2}
.footer{text-align:center;color:#777;margin:18px 0;font-size:12px}
</style>
<script>
function hoje(){
 const d=new Date();
 document.getElementById("data").value=
 d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function mascaraMoeda(el){
  let v=el.value.replace(/\D/g,'');
  if(v===''){el.value='';return;}
  v=(parseInt(v,10)/100).toFixed(2).replace('.',',');
  v=v.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  el.value=v;
}

function moeda(v){
 return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function atualizar(){
 let venda=parseFloat(document.getElementById('venda').value.replace(',','.'))||0;
 let meta=parseFloat(document.getElementById('meta').value.replace(',','.'))||0;
 let p=meta?((venda/meta)*100):0;
 document.getElementById('perc').innerText=p.toFixed(2)+'%';
 const dif=venda-meta;
document.getElementById('perc').innerText=p.toFixed(2)+'%';
document.getElementById('status').innerText=p>=100?'🟢 Meta atingida':(p>=90?'🟡 Próximo da meta':'🔴 Abaixo da meta');
const d=document.getElementById('diferenca');
if(d){d.innerText=(dif>=0?'+ ':'- ')+moeda(Math.abs(dif));}
}
function gerarId(){
 const data=document.getElementById('data').value.replace(/-/g,'');
 const chave='contador_'+data;
 let seq=parseInt(localStorage.getItem(chave)||'0',10)+1;
 return {id:'FEC-'+data+'-'+String(seq).padStart(3,'0'),seq,chave};
}

function carregarEdicao(){
 const e=JSON.parse(localStorage.getItem('fechamentoEdicao')||'null');
 if(!e) return;
 document.getElementById('data').value=e.data||'';
 document.getElementById('venda').value=e.venda||'';
 document.getElementById('meta').value=e.meta||'';
 document.getElementById('categoria').value=e.categoria||'🏪 Venda Geral';
 document.querySelector('select').value=e.motivo||'Movimento normal';
 document.querySelector('textarea').value=e.observacoes||'';
 atualizar();
}

function salvar(){
 const vendaCampo=document.getElementById('venda');
 const metaCampo=document.getElementById('meta');
 const dataCampo=document.getElementById('data');
 [dataCampo,vendaCampo,metaCampo].forEach(c=>c.style.borderColor='#ccc');
 if(!dataCampo.value){dataCampo.style.borderColor='red';alert('Informe a data.');return;}
 if(!vendaCampo.value||vendaCampo.value==='0,00'){vendaCampo.style.borderColor='red';alert('Informe a venda final.');return;}
 if(!metaCampo.value||metaCampo.value==='0,00'){metaCampo.style.borderColor='red';alert('Informe a meta do dia.');return;}
 const info=gerarId();
 const data=document.getElementById('data').value;
 let lista=JSON.parse(localStorage.getItem('fechamentos')||'[]');
 let edit=JSON.parse(localStorage.getItem('fechamentoEdicao')||'null');

 const reg={
   id: edit?edit.id:info.id,
   categoria:document.getElementById('categoria').value,
   data:data,
   venda:document.getElementById('venda').value,
   meta:document.getElementById('meta').value,
   motivo:document.querySelector('select').value,
   observacoes:document.querySelector('textarea').value,
   dataHora:new Date().toLocaleString('pt-BR')
 };

 if(edit){
   lista=lista.filter(x=>x.id!==edit.id);
   localStorage.removeItem('fechamentoEdicao');
 }else{
   localStorage.setItem(info.chave,String(info.seq));
 }

 const idx=lista.findIndex(x=>x.data===data);
 if(idx>=0 && !edit){
   if(!confirm('Já existe um fechamento nesta data. Deseja substituir?')) return;
   lista.splice(idx,1);
 }
 lista.push(reg);
 localStorage.setItem('fechamentos',JSON.stringify(lista));
 document.getElementById('idFechamento').textContent=reg.id;
document.getElementById('ultimoSalvamento').textContent=reg.dataHora;
alert('Fechamento salvo com sucesso!\nID: '+reg.id);
if(!localStorage.getItem('fechamentoEdicao')){
  // novo registro
}else{
  window.location.href='historico3.0.html';
}
document.querySelector('textarea').value='';
document.querySelector('select').selectedIndex=0;
document.getElementById('venda').value='';
document.getElementById('meta').value='';
atualizar();
}


function novoFechamento(){
 document.getElementById('data').value='';
 document.getElementById('venda').value='';
 document.getElementById('meta').value='';
 document.getElementById('categoria').selectedIndex=0;
 document.querySelector('select').selectedIndex=0;
 document.querySelector('textarea').value='';
 document.getElementById('idFechamento').textContent='Ainda não gerado';
 document.getElementById('ultimoSalvamento').textContent='-';
 atualizar();
}
function duplicarFechamento(){
 localStorage.removeItem('fechamentoEdicao');
 document.getElementById('idFechamento').textContent='Novo ID será gerado ao salvar';
 alert('Modo duplicação ativado. Altere a data, se necessário, e clique em Salvar para gerar um novo ID.');
}

window.onload=function(){hoje();carregarEdicao();};
</script>
</head>
<body>
<div class="container">
<div class="header">
<h1>📚 Fechamentos</h1>
<div>Registro Oficial do Dia</div>
</div>

<div class="card">
<label>📅 Data</label>
<input id="data" type="date">

<label>📂 Categoria</label>
<select id="categoria">
<option>🏪 Venda Geral</option>
<option>💊 Genérico e Similar</option>
<option>🧴 Perfumaria</option>
</select>

<label>💰 Venda Final (apenas números)</label>
<input id="venda" oninput="mascaraMoeda(this);atualizar()" placeholder="Ex.: 48350.20">

<label>🎯 Meta do Dia</label>
<input id="meta" oninput="mascaraMoeda(this);atualizar()" placeholder="Ex.: 42500">

<label>📌 Motivo</label>
<select>
<option>Movimento normal</option>
<option>Promoção</option>
<option>Campanha</option>
<option>Dia de pagamento</option>
<option>Feriado</option>
<option>Concorrência</option>
<option>Outro</option>
</select>

<label>📝 Observações</label>
<textarea placeholder="Descreva acontecimentos importantes do dia..."></textarea>

<div class="resumo">
<b>Resumo do Fechamento</b><br><br>
Percentual da Meta: <b id="perc">0,00%</b><br>
Status: <b id="status">Aguardando dados</b><br>Diferença: <b id="diferenca">R$ 0,00</b>
</div>

<div style="margin-top:12px;background:#eef8ee;padding:10px;border-radius:10px;">
<b>ID:</b> <span id="idFechamento">Ainda não gerado</span><br>
<b>Último salvamento:</b> <span id="ultimoSalvamento">-</span>
</div>

<div style="display:flex;gap:10px;">
<button type="button" onclick="novoFechamento()" style="background:#f57c00;flex:1;">➕ Novo</button>
<button type="button" onclick="duplicarFechamento()" style="background:#6a1b9a;flex:1;">📋 Duplicar</button>
</div>

<button onclick="salvar()">💾 Salvar Fechamento</button>
<button class="sec" onclick="window.location.href='index.html'">⬅ Voltar</button>
</div>

<div class="footer">Painel de Metas • Versão 3.1<br>by Adalto Silva</div>
</div>
</body>
</html>
