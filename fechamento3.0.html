<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fechamentos</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#eef2f5;padding:16px}
.container{max-width:560px;margin:auto}
.header{background:linear-gradient(135deg,#009640,#00b35a);color:#fff;padding:22px;border-radius:18px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.card{margin-top:16px;background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
label{display:block;margin-top:12px;font-weight:bold}
input,textarea,select{width:100%;padding:12px;margin-top:6px;border:1px solid #ccc;border-radius:10px}
textarea{min-height:90px}
.resumo{margin-top:16px;background:#f8faf8;border-left:5px solid #009640;padding:12px;border-radius:10px}
button{width:100%;padding:14px;margin-top:16px;border:none;border-radius:12px;font-size:16px;font-weight:bold;background:#009640;color:#fff}
.sec{background:#1976d2}
.footer{text-align:center;color:#777;margin:18px 0;font-size:12px}
</style>
<script>
function hoje(){
 const d=new Date();
 document.getElementById("data").value=
 d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function moeda(v){
 return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function atualizar(){
 let venda=parseFloat(document.getElementById('venda').value.replace(',','.'))||0;
 let meta=parseFloat(document.getElementById('meta').value.replace(',','.'))||0;
 let p=meta?((venda/meta)*100):0;
 document.getElementById('perc').innerText=p.toFixed(2)+'%';
 document.getElementById('status').innerText=p>=100?'🟢 Meta atingida':'🟡 Abaixo da meta';
}
function salvar(){
 alert("Na próxima versão este fechamento será salvo automaticamente no histórico.");
}
window.onload=hoje;
</script>
</head>
<body>
<div class="container">
<div class="header">
<h1>📚 Fechamentos</h1>
<div>Registro Oficial do Dia</div>
</div>

<div class="card">
<label>📅 Data</label>
<input id="data" type="date">

<label>💰 Venda Final (apenas números)</label>
<input id="venda" oninput="atualizar()" placeholder="Ex.: 48350.20">

<label>🎯 Meta do Dia</label>
<input id="meta" oninput="atualizar()" placeholder="Ex.: 42500">

<label>📌 Motivo</label>
<select>
<option>Movimento normal</option>
<option>Promoção</option>
<option>Campanha</option>
<option>Dia de pagamento</option>
<option>Feriado</option>
<option>Concorrência</option>
<option>Outro</option>
</select>

<label>📝 Observações</label>
<textarea placeholder="Descreva acontecimentos importantes do dia..."></textarea>

<div class="resumo">
<b>Resumo do Fechamento</b><br><br>
Percentual da Meta: <b id="perc">0,00%</b><br>
Status: <b id="status">Aguardando dados</b>
</div>

<button onclick="salvar()">💾 Salvar Fechamento</button>
<button class="sec" onclick="history.back()">⬅ Voltar</button>
</div>

<div class="footer">Painel de Metas • Versão 3.1<br>by Adalto Silva</div>
</div>
</body>
</html>
