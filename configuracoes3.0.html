<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Configurações</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#eef2f5;padding:16px}
.wrap{max-width:650px;margin:auto}
.header{background:linear-gradient(135deg,#009640,#00b35a);color:#fff;padding:24px;border-radius:18px;text-align:center}
.card{background:#fff;margin-top:18px;padding:20px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
label{display:block;margin-top:14px;font-weight:bold}
input,select{width:100%;padding:11px;margin-top:6px;border:1px solid #ccc;border-radius:10px}
button{width:100%;padding:13px;margin-top:16px;border:none;border-radius:12px;background:#009640;color:#fff;font-weight:bold}
.secondary{background:#1976d2}
.footer{text-align:center;color:#777;margin-top:18px;font-size:12px}
</style>
<script>
function salvar(){
 const cfg={
  loja:document.getElementById("loja").value,
  metaVendaGeral:document.getElementById("metaVendaGeral").value,
  metaGenericos:document.getElementById("metaGenericos").value,
  metaPerfumaria:document.getElementById("metaPerfumaria").value,
  horario:document.getElementById("horario").value,
  gestor:document.getElementById("gestor").value,
  impressao:document.getElementById("impressao").value,
  tema:document.getElementById("tema").value
 };
 localStorage.setItem("configuracoes",JSON.stringify(cfg));
 alert("Configurações salvas com sucesso!");
}
function carregar(){
 const c=JSON.parse(localStorage.getItem("configuracoes")||"{}");
 if(c.loja) loja.value=c.loja;
 if(c.metaVendaGeral) metaVendaGeral.value=c.metaVendaGeral;
 if(c.metaGenericos) metaGenericos.value=c.metaGenericos;
 if(c.metaPerfumaria) metaPerfumaria.value=c.metaPerfumaria;
 if(c.horario) horario.value=c.horario;
 if(c.gestor) gestor.value=c.gestor;
 if(c.impressao) impressao.value=c.impressao;
 if(c.tema) tema.value=c.tema;
}
function backup(){
 const dados=JSON.stringify(localStorage,null,2);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([dados],{type:'application/json'}));
 a.download='backup_painel_metas.json';
 a.click();
}

function restaurarBackup(){
 const arq=document.getElementById('arquivoBackup').files[0];
 if(!arq){alert('Selecione um arquivo de backup.');return;}
 const leitor=new FileReader();
 leitor.onload=function(e){
   try{
     const dados=JSON.parse(e.target.result);
     Object.keys(dados).forEach(k=>localStorage.setItem(k,dados[k]));
     alert('Backup restaurado com sucesso! Reabra as telas do sistema.');
     carregar();
   }catch(err){
     alert('Arquivo de backup inválido.');
   }
 };
 leitor.readAsText(arq);
}

window.onload=carregar;
</script>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>⚙️ Configurações</h1>
<div>Painel de Metas • Versão 3.0</div>
</div>

<div class="card">
<label>🏪 Nome da Loja</label>
<input id="loja" placeholder="Ex.: Drogaria Ultrapopular - Coxim">

<label>🏪 Meta Venda Geral</label>
<input id="metaVendaGeral" placeholder="R$ 850.000,00">

<label>💊 Meta Genérico e Similar</label>
<input id="metaGenericos" placeholder="R$ 312.000,00">

<label>🧴 Meta Perfumaria</label>
<input id="metaPerfumaria" placeholder="R$ 91.000,00">

<label>📅 Horário de Funcionamento</label>
<input id="horario" placeholder="07:00 às 22:00"><label>👤 Nome do Gestor</label><input id="gestor" placeholder="Nome do gestor responsável">

<label>🖨️ Formato de Impressão</label>
<select id="impressao">
<option>A4 Retrato</option>
<option>A4 Paisagem</option>
</select>

<label>🎨 Tema do Sistema</label>
<select id="tema">
<option>Verde (Padrão)</option>
<option>Azul</option>
<option>Cinza</option>
</select>

<button onclick="salvar()">💾 Salvar Configurações</button>
<button class="secondary" onclick="backup()">📤 Fazer Backup</button><input type="file" id="arquivoBackup" accept=".json" style="margin-top:12px;"><button class="secondary" onclick="restaurarBackup()">📥 Restaurar Backup</button>
</div>

<div class="card">
<b>Informações do Sistema</b><br><br>
Versão: 3.0<br>
Autor: Adalto Silva<br>
Projeto: Painel de Metas
</div>

<div class="footer">
Painel de Metas<br>
by Adalto Silva
</div>
</div>
</body>
</html>
