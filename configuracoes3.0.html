<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Configurações</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#eef2f5;padding:16px}
.wrap{max-width:650px;margin:auto}
.header{background:linear-gradient(135deg,#009640,#00b35a);color:#fff;padding:24px;border-radius:18px;text-align:center}
.card{background:#fff;margin-top:18px;padding:20px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
label{display:block;margin-top:14px;font-weight:bold}
input,select{width:100%;padding:11px;margin-top:6px;border:1px solid #ccc;border-radius:10px}
button{width:100%;padding:13px;margin-top:16px;border:none;border-radius:12px;background:#009640;color:#fff;font-weight:bold}
.secondary{background:#1976d2}
.footer{text-align:center;color:#777;margin-top:18px;font-size:12px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.botoes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tableWrap{overflow-x:auto}
@media(max-width:768px){
.wrap{max-width:100%}
.grid2,.botoes{grid-template-columns:1fr}
table{min-width:700px}
}
@media(min-width:1024px){
.wrap{max-width:1100px}
}
</style>
<script>

function mascaraMoeda(campo){
 let v=campo.value.replace(/\D/g,'');
 if(!v){campo.value='';return;}
 v=(parseInt(v,10)/100).toFixed(2);
 let p=v.split('.');
 let i=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
 campo.value=i+','+p[1];
}

function salvar(){
 const cfg={
  loja:document.getElementById("loja").value,
  metaVendaGeral:document.getElementById("metaVendaGeral").value,
  metaGenericos:document.getElementById("metaGenericos").value,
  metaPerfumaria:document.getElementById("metaPerfumaria").value,
  horario:document.getElementById("horario").value,
  gestor:document.getElementById("gestor").value,
  impressao:document.getElementById("impressao").value,
  tema:document.getElementById("tema").value
 };
 localStorage.setItem("configuracoes",JSON.stringify(cfg));
 alert("Configurações salvas com sucesso!");
}
function carregar(){
 const c=JSON.parse(localStorage.getItem("configuracoes")||"{}");
 if(c.loja) loja.value=c.loja;
 if(c.metaVendaGeral) metaVendaGeral.value=c.metaVendaGeral;
 if(c.metaGenericos) metaGenericos.value=c.metaGenericos;
 if(c.metaPerfumaria) metaPerfumaria.value=c.metaPerfumaria;
 if(c.horario) horario.value=c.horario;
 if(c.gestor) gestor.value=c.gestor;
 if(c.impressao) impressao.value=c.impressao;
 if(c.tema) tema.value=c.tema;
}
function backup(){
 const dados=JSON.stringify(localStorage,null,2);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([dados],{type:'application/json'}));
 a.download='backup_painel_metas.json';
 a.click();
}

function restaurarBackup(){
 const arq=document.getElementById('arquivoBackup').files[0];
 if(!arq){alert('Selecione um arquivo de backup.');return;}
 const leitor=new FileReader();
 leitor.onload=function(e){
   try{
     const dados=JSON.parse(e.target.result);
     Object.keys(dados).forEach(k=>localStorage.setItem(k,dados[k]));
     alert('Backup restaurado com sucesso! Reabra as telas do sistema.');
     carregar();
   }catch(err){
     alert('Arquivo de backup inválido.');
   }
 };
 leitor.readAsText(arq);
}

window.onload=function(){carregar();renderEquipe();};

function equipe(){return JSON.parse(localStorage.getItem('equipe')||'[]');}
function salvarEquipe(x){localStorage.setItem('equipe',JSON.stringify(x));}
let editando=-1;

window.paginaAtual=1;
window.itensPorPagina=5;
let totalPaginas=1;

function renderEquipe(){
let t=document.getElementById('listaEquipe'); if(!t)return;
let l=equipe(); const f=(pesquisaEquipe?.value||'').toLowerCase(); l=l.filter(a=>a.nome.toLowerCase().includes(f)); t.innerHTML='';
if(!l.length){t.innerHTML='<tr><td colspan="5">Nenhum atendente cadastrado.</td></tr>';return;}
let tvg=0,tgen=0,tperf=0;
// Soma toda a equipe filtrada
l.forEach(a=>{
 const vg=parseFloat(String(a.vg).replace(/\./g,'').replace(',','.'))||0;
 const ge=parseFloat(String(a.gen).replace(/\./g,'').replace(',','.'))||0;
 const pe=parseFloat(String(a.perf).replace(/\./g,'').replace(',','.'))||0;
 tvg+=vg;
 tgen+=ge;
 tperf+=pe;
});
totalPaginas=Math.max(1,Math.ceil(l.length/window.itensPorPagina));
if(paginaAtual>totalPaginas) paginaAtual=totalPaginas;
const inicio=(window.paginaAtual-1)*window.itensPorPagina;
const pagina=l.slice(inicio,inicio+window.itensPorPagina);
pagina.forEach((a,idx)=>{
 const i=inicio+idx;
 const vg=parseFloat(String(a.vg).replace(/\./g,'').replace(',','.'))||0;
 const ge=parseFloat(String(a.gen).replace(/\./g,'').replace(',','.'))||0;
 const pe=parseFloat(String(a.perf).replace(/\./g,'').replace(',','.'))||0;

 t.innerHTML+=`<tr><td>${a.nome}</td><td>${a.vg}</td><td>${a.gen}</td><td>${a.perf}</td><td>${a.status||'Ativo'}</td><td><button style='width:34px;padding:6px;background:#f0ad4e' onclick='editarAtendente(${i})'>✏️</button> <button style="width:34px;padding:6px;background:#d32f2f" onclick="excluirAtendente(${i})">🗑️</button></td></tr>`;
});
const cfg=JSON.parse(localStorage.getItem('configuracoes')||'{}');
let nav=document.getElementById('paginacaoEquipe');
if(nav){
 let infoInicio=((window.paginaAtual-1)*window.itensPorPagina)+1;
let infoFim=Math.min(window.paginaAtual*window.itensPorPagina,l.length);
nav.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;width:100%;gap:10px;background:#f5f5f5;padding:12px 16px;border-radius:14px">
<div style="font-weight:bold;color:#555">Mostrando ${infoInicio}-${infoFim} de ${l.length} funcionários</div>
<div style="display:flex;align-items:center;gap:8px">
<button style="width:auto;padding:8px 14px;border-radius:25px" onclick="paginaAnterior()">◀ Anterior</button>
<span style="background:#009640;color:#fff;padding:8px 14px;border-radius:50px;font-weight:bold">${window.paginaAtual}</span>
<span style="color:#666">/ ${totalPaginas}</span>
<button style="width:auto;padding:8px 14px;border-radius:25px" onclick="proximaPagina()">Próxima ▶</button>
</div>
</div>`;
}
document.getElementById('resumoEquipe').innerHTML=
`<tr style="background:#f5f5f5;font-weight:bold"><td>👥 Total da Equipe</td><td>${tvg.toLocaleString('pt-BR')}</td><td>${tgen.toLocaleString('pt-BR')}</td><td>${tperf.toLocaleString('pt-BR')}</td><td colspan="2"></td></tr>
<tr style="background:#e8f5e9;font-weight:bold"><td>🏪 Meta da Loja</td><td>${cfg.metaVendaGeral||'-'}</td><td>${cfg.metaGenericos||'-'}</td><td>${cfg.metaPerfumaria||'-'}</td><td colspan="2"></td></tr>`;
}
function adicionarAtendente(){
if(!nomeAtendente.value.trim()){alert('Informe o nome.');return;}
let l=equipe();const obj={nome:nomeAtendente.value,vg:metaVGAt.value,gen:metaGenAt.value,perf:metaPerfAt.value,status:statusAt.value};
if(editando>=0){l[editando]=obj;editando=-1;}else{l.push(obj);}
salvarEquipe(l);nomeAtendente.value=metaVGAt.value=metaGenAt.value=metaPerfAt.value='';statusAt.value='Ativo';document.querySelector("button[onclick='adicionarAtendente()']").textContent='➕ Adicionar Atendente';renderEquipe();}
function excluirAtendente(i){let l=equipe();if(confirm('Excluir?')){l.splice(i,1);salvarEquipe(l);renderEquipe();}}

function editarAtendente(i){
 const l=equipe(); const a=l[i];
 nomeAtendente.value=a.nome; metaVGAt.value=a.vg; metaGenAt.value=a.gen; metaPerfAt.value=a.perf; statusAt.value=a.status||'Ativo';
 editando=i;document.querySelector("button[onclick='adicionarAtendente()']").textContent='💾 Salvar Alterações';
}

function paginaAnterior(){if(window.paginaAtual>1){window.paginaAtual--;renderEquipe();}}
function proximaPagina(){if(window.paginaAtual<totalPaginas){window.paginaAtual++;renderEquipe();}}

</script>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>⚙️ Configurações</h1>
<div>Painel de Metas • Versão 3.0</div>
</div>

<div class="card">
<div class="grid2">
<div><label>🏪 Nome da Loja</label>
<input id="loja" placeholder="Ex.: Drogaria Ultrapopular - Coxim">

<label>🏪 Meta Venda Geral</label>
<input id="metaVendaGeral" placeholder="R$ 850.000,00" inputmode="numeric" oninput="mascaraMoeda(this)">

<label>💊 Meta Genérico e Similar</label>
<input id="metaGenericos" placeholder="R$ 312.000,00" inputmode="numeric" oninput="mascaraMoeda(this)">

<label>🧴 Meta Perfumaria</label>
<input id="metaPerfumaria" placeholder="R$ 91.000,00" inputmode="numeric" oninput="mascaraMoeda(this)">

<label>📅 Horário de Funcionamento</label>
<input id="horario" placeholder="07:00 às 22:00"><label>👤 Nome do Gestor</label><input id="gestor" placeholder="Nome do gestor responsável">

</div><div><label>🖨️ Formato de Impressão</label>
<select id="impressao">
<option>A4 Retrato</option>
<option>A4 Paisagem</option>
</select>

<label>🎨 Tema do Sistema</label>
<select id="tema">
<option>Verde (Padrão)</option>
<option>Azul</option>
<option>Cinza</option>
</select>

</div></div><div class="botoes"><button onclick="salvar()">💾 Salvar Configurações</button>
<button class="secondary" onclick="backup()">📤 Fazer Backup</button></div><input type="file" id="arquivoBackup" accept=".json" style="margin-top:12px;"><button class="secondary" onclick="restaurarBackup()">📥 Restaurar Backup</button>
</div>


<div class="card">
<h3 style="color:#009640;margin-top:0">👥 Equipe</h3>
<p>Cadastre as metas individuais dos atendentes.</p><input id="pesquisaEquipe" placeholder="🔎 Pesquisar atendente" oninput="renderEquipe()">
<input id="nomeAtendente" placeholder="Nome do atendente">
<input id="metaVGAt" placeholder="Meta Venda Geral" inputmode="numeric" oninput="mascaraMoeda(this)">
<input id="metaGenAt" placeholder="Meta Genérico e Similar" inputmode="numeric" oninput="mascaraMoeda(this)">
<input id="metaPerfAt" placeholder="Meta Perfumaria" inputmode="numeric" oninput="mascaraMoeda(this)"><select id="statusAt"><option>Ativo</option><option>Inativo</option></select>
<button onclick="adicionarAtendente()">💾 Salvar Atendente</button>
<div class="tableWrap"><table style="width:100%;margin-top:15px;border-collapse:collapse">
<thead><tr style="background:#009640;color:#fff"><th>Nome</th><th>VG</th><th>GEN</th><th>PERF</th><th>Status</th><th>Ações</th></tr></thead>
<tbody id="listaEquipe"></tbody><tfoot id='resumoEquipe'></tfoot>
</table><div id='paginacaoEquipe' style='display:flex;justify-content:center;align-items:center;gap:8px;margin-top:12px'></div></div>
</div>
<div class="card">
<b>Informações do Sistema</b><br><br>
Versão: 3.0<br>
Autor: Adalto Silva<br>
Projeto: Painel de Metas
</div>

<button class="secondary" onclick="window.location.href='index.html'">⬅️ Menu Principal</button><div class="footer">
Painel de Metas<br>
by Adalto Silva
</div>
</div>
</body>
</html>
