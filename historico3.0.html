<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Histórico</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#eef2f5;padding:16px}
.wrap{max-width:1000px;margin:auto}
.header{background:linear-gradient(135deg,#009640,#00b35a);color:#fff;padding:22px;border-radius:18px;text-align:center}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;background:#fff;padding:16px;margin-top:16px;border-radius:14px}
.toolbar input,.toolbar select,.toolbar button{padding:10px;border-radius:10px;border:1px solid #ccc}
.toolbar button{background:#009640;color:#fff;border:none}
table{width:100%;border-collapse:collapse;background:#fff;margin-top:16px;border-radius:14px;overflow:hidden}
th{background:#009640;color:#fff}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:center}
.status-ok{color:#009640;font-weight:bold}
.status-warn{color:#d98200;font-weight:bold}
.footer{text-align:center;color:#777;margin-top:18px;font-size:12px}

.acoes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.acoes button{padding:8px 10px;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}
.btn-ver{background:#1976d2}
.btn-ed{background:#fbc02d;color:#222}
.btn-ex{background:#d32f2f}
@media(max-width:700px){
table{font-size:12px}
th,td{padding:8px}
.acoes{flex-direction:column}
.acoes button{width:100%}
}


.toolbar input,.toolbar select{flex:1;min-width:180px}
.toolbar button{min-width:160px;font-weight:bold}
@media(max-width:700px){
.toolbar{display:grid;grid-template-columns:1fr;gap:10px}
.toolbar input,.toolbar select,.toolbar button{
width:100%;
margin:0;
padding:12px;
font-size:15px;
}
}

</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>📈 Histórico de Fechamentos</h1>
<div>Painel de Metas • Versão 3.0</div>
</div>

<div class="toolbar">
<select><option>Julho/2026</option><option>Junho/2026</option></select>
<select id="filtroCategoria" onchange="carregarHistorico()">
<option value="">Todas as categorias</option>
<option>🏪 Venda Geral</option>
<option>💊 Genérico e Similar</option>
<option>🧴 Perfumaria</option>
</select>
<input type="text" placeholder="Pesquisar por data">
<button onclick="window.location.href='index.html'" style="background:#1565c0;">⬅️ Menu Principal</button>
<button>🔍 Pesquisar Dados</button>
<button>🖨️ Imprimir Relatório</button>
<button>📄 Exportar PDF</button>
</div>
<div style="margin-top:12px;background:#fff;padding:12px;border-radius:12px;font-weight:bold;">📊 Total de Fechamentos: <span id="totalFechamentos">0</span></div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px;">
<div style="background:#fff;padding:10px;border-radius:10px;"><b>💰 Total Vendido</b><br><span id="totalVendido">R$ 0,00</span></div>
<div style="background:#fff;padding:10px;border-radius:10px;"><b>📈 Média Diária</b><br><span id="mediaDiaria">R$ 0,00</span></div>
<div style="background:#fff;padding:10px;border-radius:10px;"><b>🎯 Metas Atingidas</b><br><span id="metasAtingidas">0</span></div>
</div>
<table>
<thead>
<tr>
<th>ID</th><th>Data</th><th>Categoria</th>
<th>Venda Final</th>
<th>Meta</th>
<th>%</th>
<th>Status</th>
<th>Motivo</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="dados">
<tr>
<td colspan="9">Nenhum fechamento cadastrado.</td>
</tr>
</tbody>
</table>

<div class="footer">
Painel de Metas<br>
by Adalto Silva
</div>
</div>
<script>
// Preparado para ler o localStorage nas próximas versões.
</script>

<script>
function moeda(v){
  return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function carregarHistorico(){
 const tb=document.getElementById('dados');
 let dados=JSON.parse(localStorage.getItem('fechamentos')||'[]');
 const cat=document.getElementById('filtroCategoria').value;
 if(cat) dados=dados.filter(x=>x.categoria===cat);
 tb.innerHTML='';
 document.getElementById('totalFechamentos').textContent=dados.length;
let soma=0, metas=0;
 if(!dados.length){
   tb.innerHTML='<tr><td colspan="9">Nenhum fechamento cadastrado.</td></tr>';
   return;
 }
 dados.sort((a,b)=>b.data.localeCompare(a.data));
 dados.forEach((r,i)=>{
   const venda=parseFloat(String(r.venda).replace(/\./g,'').replace(',','.'))||0;
   const meta=parseFloat(String(r.meta).replace(/\./g,'').replace(',','.'))||0;
   const perc=meta?((venda/meta)*100):0;
   if(perc>=100) metas++;
   soma+=venda;
   const cor=perc>=100?'#eaf8ea':'#fff8e6';
   tb.innerHTML+=`<tr style="background:${cor}">
   <td>${r.id||'-'}</td>
   <td>${r.data}</td><td>${r.categoria||'🏪 Venda Geral'}</td>
   <td>${moeda(venda)}</td>
   <td>${moeda(meta)}</td>
   <td>${perc.toFixed(2)}%</td>
   <td>${perc>=100?'🟢 Meta':'🟡 Abaixo'}</td>
   <td>${r.motivo||'-'}</td>
   <td>
<div class="acoes">
<button class="btn-ver" onclick="visualizar(${i})">👁️ Visualizar</button>
<button class="btn-ed" onclick="editar(${i})">✏️ Editar</button>
<button class="btn-ex" onclick="excluirRegistro(${i})">🗑️ Excluir</button>
</div>
</td></tr>`;
 });
 document.getElementById('totalVendido').textContent=moeda(soma);
 document.getElementById('mediaDiaria').textContent=moeda(dados.length?soma/dados.length:0);
 document.getElementById('metasAtingidas').textContent=metas;
}

function visualizar(i){
 const d=JSON.parse(localStorage.getItem('fechamentos')||'[]')[i];
 alert('ID: '+d.id+'\nData: '+d.data+'\nVenda: '+d.venda+'\nMeta: '+d.meta+'\nMotivo: '+d.motivo+'\nSalvo em: '+(d.dataHora||'-')+'\n\n'+(d.observacoes||''));
}
function editar(i){
 localStorage.setItem('fechamentoEdicao',JSON.stringify(JSON.parse(localStorage.getItem('fechamentos'))[i]));
 window.location.href='fechamento3.0.html';
}
function excluirRegistro(i){
 let arr=JSON.parse(localStorage.getItem('fechamentos')||'[]');
 if(confirm('Excluir este fechamento?')){
   arr.splice(i,1);
   localStorage.setItem('fechamentos',JSON.stringify(arr));
   carregarHistorico();
 }
}
window.onload=carregarHistorico;
</script>
</body>
</html>
