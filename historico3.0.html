<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Histórico</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#eef2f5;padding:16px}
.wrap{max-width:1000px;margin:auto}
.header{background:linear-gradient(135deg,#009640,#00b35a);color:#fff;padding:22px;border-radius:18px;text-align:center}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;background:#fff;padding:16px;margin-top:16px;border-radius:14px}
.toolbar input,.toolbar select,.toolbar button{padding:10px;border-radius:10px;border:1px solid #ccc}
.toolbar button{background:#009640;color:#fff;border:none}
table{width:100%;border-collapse:collapse;background:#fff;margin-top:16px;border-radius:14px;overflow:hidden}
th{background:#009640;color:#fff}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:center}
.status-ok{color:#009640;font-weight:bold}
.status-warn{color:#d98200;font-weight:bold}
.footer{text-align:center;color:#777;margin-top:18px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>📈 Histórico de Fechamentos</h1>
<div>Painel de Metas • Versão 3.0</div>
</div>

<div class="toolbar">
<select><option>Julho/2026</option><option>Junho/2026</option></select>
<input type="text" placeholder="Pesquisar por data">
<button>🔍 Pesquisar</button>
<button>🖨️ Imprimir</button>
<button>📄 Exportar PDF</button>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Venda Final</th>
<th>Meta</th>
<th>%</th>
<th>Status</th>
<th>Motivo</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="dados">
<tr>
<td colspan="7">Nenhum fechamento cadastrado.</td>
</tr>
</tbody>
</table>

<div class="footer">
Painel de Metas<br>
by Adalto Silva
</div>
</div>
<script>
// Preparado para ler o localStorage nas próximas versões.
</script>
</body>
</html>
